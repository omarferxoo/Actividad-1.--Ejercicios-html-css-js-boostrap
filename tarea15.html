<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estudiantes</title>
    <link rel="stylesheet" href="css/tarea15.css">
</head>
<body>

<div class="contenedor">

    <h1>Registro de Estudiantes</h1>

    <label>Nombre</label>
    <input type="text" id="nombre" placeholder="Nombre del estudiante">

    <label>Calificación</label>
    <input type="number" id="calificacion" placeholder="Calificación">

    <button onclick="agregar()">Agregar estudiante</button>
    <button onclick="calcular()">Calcular</button>

    <br><br>

    <label>Promedio</label>
    <input type="text" id="promedio" readonly>

    <label>Calificación más alta</label>
    <input type="text" id="mayor" readonly>

    <label>Calificación más baja</label>
    <input type="text" id="menor" readonly>

</div>

<script src="js/tarea15.js"></script>

</body>
</html>
