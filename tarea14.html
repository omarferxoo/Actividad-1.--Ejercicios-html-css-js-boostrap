<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayor, Menor y Promedio</title>
    <link rel="stylesheet" href="css/tarea14.css">
</head>
<body>
    <div class="contenedor">
        <h1>Calculadora de Números</h1>
        <label for="numeros">Ingresa números separados por comas:</label>
        <input type="text" id="numeros" placeholder="Ej: 10, 20, 30, 40, 50">
        <button onclick="calcular()">Calcular</button>
        <label for="mayor">Número mayor:</label>
        <input type="text" id="mayor" readonly>
        <label for="menor">Número menor:</label>
        <input type="text" id="menor" readonly>
        <label for="promedio">Promedio:</label>
        <input type="text" id="promedio" readonly>
    </div>
    <script src="js/tarea14.js"></script>
</body>
</html>
