<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica</title>

    <link rel="stylesheet" href="css/tarea16.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="contenedor">
    <h1>Calculadora Básica</h1>
    <label>Número 1</label>
    <input type="number" id="numero1">
    <label>Número 2</label>
    <input type="number" id="numero2">
    <button onclick="calcularOperacion('suma')">Sumar</button>
    <button onclick="calcularOperacion('resta')">Restar</button>
    <button onclick="calcularOperacion('multiplicacion')">Multiplicar</button>
    <button onclick="calcularOperacion('division')">Dividir</button>
    <label>Resultado</label>
    <input type="text" id="resultado" readonly>
</div>
<script src="js/tarea16.js"></script>
</body>
</html>
