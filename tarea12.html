<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor MXN a USD</title>
    <link rel="stylesheet" href="css/tarea12.css">
</head>
<body>

    <div class="contenedor">

        <h1>Convertidor de Pesos a Dólares</h1>

        <label for="pesos">Cantidad en Pesos Mexicanos (MXN):</label>
        <input type="number" id="pesos" placeholder="Ej: 500">

        <button onclick="convertir()">Convertir</button>

        <label for="dolares">Resultado en Dólares (USD):</label>
        <input type="text" id="dolares" readonly>

    </div>

    <script src="js/tarea12.js"></script>

</body>
</html>
