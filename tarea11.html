<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor de Kilómetros a Millas</title>
    <link rel="stylesheet" href="css/tarea11.css">
</head>
<body>

    <div class="contenedor">
        <h1>Convertidor de Kilómetros a Millas</h1>
        <label for="kilometros">Distancia en kilómetros:</label>
        <input type="number" id="kilometros" placeholder="Ej: 10">
        <button onclick="convertir()">Convertir</button>
        <label for="millas">Resultado en millas:</label>
        <input type="text" id="millas" readonly>
    </div>
    <script src="js/tarea11.js"></script>
</body>
</html>
